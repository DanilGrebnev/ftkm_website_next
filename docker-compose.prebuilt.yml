# Запуск уже собранного образа приложения + MongoDB.
#
# Сборка образа приложения (на хосте после yarn build):
#   docker build -f Dockerfile.prebuilt -t next_app:latest .
#
# Запуск:
#   docker compose -f docker-compose.prebuilt.yml up
#
# Переменные — из .env в корне проекта.

version: "3.9"

services:
  mongodb:
    image: ${MONGO_IMAGE:-mongo:7}
    container_name: next_mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?Set MONGO_INITDB_ROOT_USERNAME in .env}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?Set MONGO_INITDB_ROOT_PASSWORD in .env}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet -u \"$$MONGO_INITDB_ROOT_USERNAME\" -p \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --eval \"quit(db.runCommand({ ping: 1 }).ok ? 0 : 1)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    image: ${DOCKER_APP_IMAGE:-next_app:latest}
    container_name: next_app
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    env_file:
      - .env
    environment:
      PORT: ${FRONTEND_PORT:-3000}
      MONGO_DB_HOST: mongodb
      MONGO_DB_PORT: "27017"

volumes:
  mongodb_data:
