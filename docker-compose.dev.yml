services:
  mongo:
    image: mongo:7
    container_name: ftkm_next_mongo
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  next:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ftkm_next
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    env_file: .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/ftkm
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - .:/app
      - /app/node_modules
      - ./public/uploads:/app/public/uploads
    depends_on:
      - mongo
    restart: unless-stopped

volumes:
  mongo_data:
