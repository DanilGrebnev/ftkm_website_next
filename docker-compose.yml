version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: next_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "-u",
          "admin",
          "-p",
          "admin",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.runCommand({ ping: 1 }).ok",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: next_app
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      FRONTEND_PORT: 3000
      MONGODB_URI: mongodb://admin:admin@mongodb:27017/admin
      SECRET_JWT: your-secret-key-change-me
      ADMIN_LOGIN: admin
      ADMIN_PASSWORD: admin123

volumes:
  mongodb_data:
