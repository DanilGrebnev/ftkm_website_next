services:
  mongo:
    image: mongo:7
    container_name: ftkm_next_mongo
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  next:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ftkm_next
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    env_file: .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/ftkm
    volumes:
      - uploads_data:/app/public/uploads
    depends_on:
      - mongo
    restart: unless-stopped

volumes:
  mongo_data:
  uploads_data:
